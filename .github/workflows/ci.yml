name: CI

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  CI:
    if: ${{ github.repository == 'googleapis/ruby-common-tools' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            ruby: "3.2"
            build: true
            jobs: "--only --test"
          - os: ubuntu-latest
            ruby: "3.3"
            build: true
            jobs: "--only --test"
          - os: ubuntu-latest
            ruby: "3.4"
            build: true
            jobs: "--only --test"
          - os: ubuntu-latest
            ruby: "3.4"
            build: false
            jobs: "--only --rubocop"
          - os: ubuntu-latest
            ruby: "4.0"
            build: true
            jobs: "--only --test"
          - os: ubuntu-latest
            ruby: "4.0"
            build: false
            jobs: "--only --rubocop"
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repo
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        persist-credentials: false
    - name: Install Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
      with:
        ruby-version: "${{ matrix.ruby }}"
    - name: Install NodeJS 20.x
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: "20.x"
    - name: Install tools and deps
      shell: bash
      run: "gem install --no-document toys && bundle install"
    - name: Test
      shell: bash
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
      run: toys ci ${{ matrix.jobs }} --include-owlbot-build --github-event-name="$GITHUB_EVENT_NAME" --github-event-payload="${GITHUB_EVENT_PATH}" < /dev/null
