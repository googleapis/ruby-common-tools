name: CI
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  CI:
    if: ${{ github.repository == 'googleapis/ruby-common-tools' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            ruby: "3.2"
            build: true
            jobs: "--only --test"
          - os: ubuntu-latest
            ruby: "3.3"
            build: true
            jobs: "--only --test"
          - os: ubuntu-latest
            ruby: "3.4"
            build: true
            jobs: "--only --test"
          - os: ubuntu-latest
            ruby: "3.4"
            build: false
            jobs: "--only --rubocop"
          - os: ubuntu-latest
            ruby: "4.0"
            build: true
            jobs: "--only --test"
          - os: ubuntu-latest
            ruby: "4.0"
            build: false
            jobs: "--only --rubocop"
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repo
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Install Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
      with:
        ruby-version: "${{ matrix.ruby }}"
    - name: Install NodeJS 24.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: "24.x"
    - name: Install tools and deps
      shell: bash
      run: "gem install --no-document toys && bundle install"
    - name: Test
      shell: bash
      run: toys ci ${{ matrix.jobs }} --include-owlbot-build --github-event-name=${{ github.event_name }} --github-event-payload=${GITHUB_EVENT_PATH} < /dev/null
